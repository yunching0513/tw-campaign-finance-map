<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,600;1,500&family=DM+Sans:wght@400;500&family=Noto+Sans+TC:wght@400;500&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F2F2F2;--ink:#333;--ink-strong:#000;--shu:#A6392C;--accent:#b8a98c;--line:#dcdcdc}
  *{margin:0;box-sizing:border-box}
  html,body{background:#fff}
  /* 1200×630 = 標準 Open Graph 尺寸 */
  #card{width:1200px;height:630px;background:var(--bg);position:relative;overflow:hidden;
    font-family:"DM Sans","Noto Sans TC",sans-serif;display:flex;
    border-bottom:6px solid var(--shu)}
  .left{flex:1;padding:78px 0 70px 84px;display:flex;flex-direction:column}
  .eyebrow{font-family:"Cormorant",serif;font-style:italic;font-weight:600;color:var(--shu);
    font-size:32px;letter-spacing:.02em}
  .eyebrow .en{font-family:"DM Sans",sans-serif;font-style:normal;text-transform:uppercase;
    letter-spacing:.32em;font-size:15px;color:#9a9a9a;margin-left:14px;vertical-align:middle}
  h1{font-family:"Noto Serif TC",serif;font-weight:700;color:var(--ink-strong);
    font-size:86px;line-height:1.16;margin:20px 0 0;letter-spacing:.02em}
  .tag{font-size:23px;color:#555;margin-top:30px;line-height:1.75;font-weight:500;max-width:560px}
  .tag b{color:var(--shu);font-weight:500}
  .url{margin-top:auto;font-size:18px;color:#9a9a9a;letter-spacing:.05em}
  .url b{color:#777;font-weight:500}
  .right{width:432px;position:relative}
  svg{position:absolute;right:26px;top:50%;transform:translateY(-50%);height:572px}
  .county{stroke:#fff;stroke-width:.8}
  .vlabel{position:absolute;top:44px;right:40px;writing-mode:vertical-rl;
    font-family:"Noto Serif TC",serif;font-weight:600;letter-spacing:.34em;
    color:var(--accent);font-size:23px}
</style>
</head>
<body>
<div id="card">
  <div class="left">
    <div class="eyebrow">金錢的地理學<span class="en">Follow the Money · Taiwan</span></div>
    <h1>政治獻金與<br>牠們的產地</h1>
    <div class="tag"><b>2018–2024 四屆</b>選舉政治獻金 ｜ 候選人金主・企業跨選區捐贈・政黨與產業比較</div>
    <div class="url">yunching0513.github.io/tw-campaign-finance-map　·　開發 <b>吳昀慶 Yun Ching Wu</b></div>
  </div>
  <div class="right">
    <span class="vlabel">臺灣 政治獻金</span>
    <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>
<script src="map_data.js"></script>
<script>
  const D=window.MAP_DATA, svg=document.getElementById('map');
  svg.setAttribute('viewBox', D.meta.viewbox.join(' '));
  const key='mayor_2022';
  const vals=D.counties.map(c=>(c.layers[key]||{}).total||0).filter(v=>v>0);
  const lo=Math.log(Math.min(...vals)+1), hi=Math.log(Math.max(...vals)+1);
  const fill=t=>{const a=[243,231,227],b=[166,57,44];
    const c=a.map((x,i)=>Math.round(x+(b[i]-x)*Math.pow(Math.max(t,0),.85)));
    return `rgb(${c.join(',')})`;};
  D.counties.forEach(c=>{ if(!c.path) return;
    const tv=(c.layers[key]||{}).total||0;
    const t=tv>0?(Math.log(tv+1)-lo)/(hi-lo):0;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',c.path); p.setAttribute('class','county');
    p.setAttribute('fill', tv>0?fill(t):'#ECECEC');
    svg.appendChild(p);
  });
  document.title='og-ready';
</script>
</body>
</html>
